spring.application.name=spring-etl-engine
spring.devtools.restart.enabled=false


# Dev metadata database settings (persistent local SQLite)
spring.datasource.url=jdbc:sqlite:./.etl-dev/etl-dev.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-init-sql=PRAGMA busy_timeout=5000

# Spring Batch metadata schema
spring.batch.jdbc.initialize-schema=always
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.sql.init.schema-locations=classpath:org/springframework/batch/core/schema-sqlite.sql


# Optional: show SQL logs
spring.jpa.show-sql=true
