# DEPRECATED: this legacy validation-config.yaml is not part of the active ETL runtime path.
# Use source config validation via the selected source-config.yaml and record validation via
# processor-config.yaml field rules handled by the active processor validation flow instead.
csv:
  files:
    customers:
      - field: id
        rule: notNull
        enabled: true
      - field: email
        rule: regex
        pattern: "^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$"
        enabled: false
xml:
  files:
    orders:
      - rule: xsd
        xsdPath: "schemas/orders.xsd"
        enabled: true
