spring.profiles.active=dev

# External ETL configuration paths
# Product-facing business-scenario/job selector.
# Point this to one job-config.yaml that defines the selected ETL run.
# Startup is strict by default: when this property is not set, the app fails
# unless demo fallback is explicitly enabled below.
# etl.config.job=src/main/resources/config-scenarios/customer-load/job-config.yaml
# Demo fallback is intended for local/demo use only. When enabled and
# etl.config.job is not set, the runtime uses the direct source/target/
# processor properties below, which default to bundled repo resources and
# may still fall back to classpath YAML when the files are unavailable.
etl.config.allow-demo-fallback=false
# Base directory for daily log folders in the form logs/<yyyy-MM-dd>/<scenario>.log.
etl.logging.base-dir=logs
etl.config.source=src/main/resources/source-config.yaml
etl.config.target=src/main/resources/target-config.yaml
etl.config.processor=src/main/resources/processor-config.yaml

# Model paths configuration
model.paths.sourceDir=src/main/java/com/etl/model/source
model.paths.targetDir=src/main/java/com/etl/model/target
model.paths.sourceClassDir=target/classes/com/etl/model/source
model.paths.targetClassDir=target/classes/com/etl/model/target

# Enable debug logging for BatchConfig
logging.level.com.etl.config.BatchConfig=DEBUG
# Optionally, enable debug for the whole project
# logging.level.com.etl=DEBUG
