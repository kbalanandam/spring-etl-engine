name: customer-load-retry-policy-runtime-failure
isActive: true
sourceConfigPath: source-config.yaml
targetConfigPath: target-config.yaml
processorConfigPath: processor-config.yaml
steps:
  - name: customers-step
    source: Customers
    target: CustomersCsv
    retryPolicy:
      enabled: true
      maxAttempts: 3
      backoffMs: 100
      retryableCategories:
        - runtime


