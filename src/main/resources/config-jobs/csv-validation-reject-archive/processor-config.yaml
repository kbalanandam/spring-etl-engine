type: default
rejectHandling:
  enabled: true
  outputPath: output/rejects/
  includeReasonColumns: true
  packageAsZip: true
mappings:
  - source: Events
    target: EventsCsv
    fields:
      - from: id
        to: id
        rules:
          - type: notNull
      - from: eventTime
        to: eventTime
        rules:
          - type: notNull
          - type: timeFormat
            pattern: HH:mm:ss
      - from: description
        to: description

