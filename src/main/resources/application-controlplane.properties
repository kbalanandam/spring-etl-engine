spring.application.name=spring-etl-engine-control-plane
spring.main.web-application-type=servlet
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.batch.BatchAutoConfiguration
server.port=8081
etl.logging.base-dir=logs
controlplane.triggers.persistence.mode=jdbc
controlplane.triggers.persistence.mode-marker-path=.controlplane/trigger-event-persistence-mode.marker
controlplane.triggers.persistence.allow-mode-switch=false
controlplane.triggers.retention-per-job=500
controlplane.runs.persistence.mode=jdbc
controlplane.runs.retention=5000
controlplane.schedules.persistence.mode=jdbc
controlplane.scheduler.enabled=false
controlplane.scheduler.poll-interval-ms=30000
controlplane.scheduler.missed-run-policy=SKIP
controlplane.scheduler.overlap-policy=ALLOW
controlplane.scheduler.max-catch-up-iterations=2000
controlplane.scheduler.trigger-reason=schedule_tick
controlplane.scheduler.requested-by=scheduler
spring.datasource.url=jdbc:sqlite:./.etl-dev/etl-dev.db
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1
spring.sql.init.mode=never
spring.batch.jdbc.initialize-schema=never

