openapi: 3.1.0
info:
  title: OneFlow Control Plane - Monitoring First API
  version: 0.1.0
  description: |
    Current contract for the monitoring-first control-plane starter implemented by
    com.etl.controlplane.ControlPlaneApiApplication.
servers:
  - url: /api/v1
    description: Relative base path for the monitoring-first control-plane API

tags:
  - name: Jobs
  - name: Runs
  - name: Schedules
  - name: System

paths:
  /jobs:
    get:
      tags: [Jobs]
      operationId: listJobs
      summary: List preserved job bundles with readiness projection metadata
      responses:
        '200':
          description: Job bundle summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobBundleListResponse'

  /jobs/{jobKey}:
    get:
      tags: [Jobs]
      operationId: getJobByKey
      summary: Get one aggregated job detail payload
      parameters:
        - $ref: '#/components/parameters/jobKey'
      responses:
        '200':
          description: Aggregated job detail with recent runs and trigger events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobBundleDetailResponse'
        '404':
          description: Job bundle not found

  /jobs/{jobKey}:trigger-now:
    post:
      tags: [Jobs]
      operationId: triggerJobNow
      summary: Record an accepted placeholder trigger decision for a known job bundle
      parameters:
        - $ref: '#/components/parameters/jobKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TriggerNowRequest'
      responses:
        '202':
          description: Placeholder trigger decision accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerNowDecisionResponse'
        '404':
          description: Job bundle not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerNowDecisionResponse'

  /jobs/{jobKey}/trigger-events:
    get:
      tags: [Jobs]
      operationId: listJobTriggerEvents
      summary: List recent trigger events for one job bundle
      parameters:
        - $ref: '#/components/parameters/jobKey'
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
      responses:
        '200':
          description: Trigger event history entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerEventListResponse'
        '404':
          description: Job bundle not found

  /runs:
    get:
      tags: [Runs]
      operationId: listRuns
      summary: List recent RUN_SUMMARY projections from scenario logs
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 25
      responses:
        '200':
          description: Run summary projections
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunSummaryListResponse'

  /runs/{jobExecutionId}:
    get:
      tags: [Runs]
      operationId: getRunByJobExecutionId
      summary: Get one projected run summary by job execution id
      parameters:
        - $ref: '#/components/parameters/jobExecutionId'
      responses:
        '200':
          description: Run summary projection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunSummaryView'
        '404':
          description: Run summary not found

  /runs/{jobExecutionId}/detail:
    get:
      tags: [Runs]
      operationId: getRunDetailByJobExecutionId
      summary: Get one richer run drill-down assembled from structured log evidence
      parameters:
        - $ref: '#/components/parameters/jobExecutionId'
      responses:
        '200':
          description: Run detail projection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunDetailView'
        '404':
          description: Run detail not found

  /schedules:
    get:
      tags: [Schedules]
      operationId: listSchedules
      summary: List persisted schedules
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 25
      responses:
        '200':
          description: Schedule list response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleListResponse'
    post:
      tags: [Schedules]
      operationId: createSchedule
      summary: Create one persisted schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScheduleRequest'
      responses:
        '201':
          description: Created schedule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleViewResponse'
        '400':
          description: Invalid request
        '409':
          description: Duplicate schedule key

  /schedules/{scheduleId}:
    get:
      tags: [Schedules]
      operationId: getScheduleById
      summary: Get one schedule by id
      parameters:
        - $ref: '#/components/parameters/scheduleId'
      responses:
        '200':
          description: Schedule detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleViewResponse'
        '404':
          description: Schedule not found
    put:
      tags: [Schedules]
      operationId: updateSchedule
      summary: Update one schedule
      parameters:
        - $ref: '#/components/parameters/scheduleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateScheduleRequest'
      responses:
        '200':
          description: Updated schedule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleViewResponse'
        '400':
          description: Invalid request
        '404':
          description: Schedule not found

  /schedules/{scheduleId}:enable:
    post:
      tags: [Schedules]
      operationId: enableSchedule
      summary: Enable one schedule
      parameters:
        - $ref: '#/components/parameters/scheduleId'
      responses:
        '200':
          description: Schedule state updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleStateChangeResponse'
        '404':
          description: Schedule not found

  /schedules/{scheduleId}:disable:
    post:
      tags: [Schedules]
      operationId: disableSchedule
      summary: Disable one schedule
      parameters:
        - $ref: '#/components/parameters/scheduleId'
      responses:
        '200':
          description: Schedule state updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleStateChangeResponse'
        '404':
          description: Schedule not found

  /schedules/{scheduleId}:pause:
    post:
      tags: [Schedules]
      operationId: pauseSchedule
      summary: Pause one schedule
      parameters:
        - $ref: '#/components/parameters/scheduleId'
      responses:
        '200':
          description: Schedule state updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleStateChangeResponse'
        '404':
          description: Schedule not found

  /schedules/{scheduleId}:resume:
    post:
      tags: [Schedules]
      operationId: resumeSchedule
      summary: Resume one schedule
      parameters:
        - $ref: '#/components/parameters/scheduleId'
      responses:
        '200':
          description: Schedule state updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleStateChangeResponse'
        '404':
          description: Schedule not found

  /schedules/{scheduleId}/trigger-events:
    get:
      tags: [Schedules]
      operationId: listScheduleTriggerEvents
      summary: List recent trigger events for one schedule (resolved via selected job key)
      parameters:
        - $ref: '#/components/parameters/scheduleId'
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
      responses:
        '200':
          description: Trigger event history entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerEventListResponse'
        '404':
          description: Schedule not found

  /system/health:
    get:
      tags: [System]
      operationId: getSystemHealth
      summary: Get minimal control-plane health status
      responses:
        '200':
          description: System health response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemHealthResponse'

  /system/info:
    get:
      tags: [System]
      operationId: getSystemInfo
      summary: Get control-plane service metadata
      responses:
        '200':
          description: System info response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemInfoResponse'

components:
  parameters:
    jobKey:
      in: path
      name: jobKey
      required: true
      schema:
        type: string
    jobExecutionId:
      in: path
      name: jobExecutionId
      required: true
      schema:
        type: integer
        format: int64
    scheduleId:
      in: path
      name: scheduleId
      required: true
      schema:
        type: string

  schemas:
    ReadinessStatus:
      type: string
      enum: [READY, INACTIVE, INVALID]

    JobBundleSummaryView:
      type: object
      properties:
        jobKey:
          type: string
        displayName:
          type: string
        jobConfigPath:
          type: string
        readinessStatus:
          $ref: '#/components/schemas/ReadinessStatus'
        validationMessages:
          type: array
          items:
            type: string
      required: [jobKey, displayName, jobConfigPath, readinessStatus, validationMessages]

    JobBundleListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/JobBundleSummaryView'
        page:
          type: integer
        size:
          type: integer
        totalItems:
          type: integer
          format: int64
      required: [items, page, size, totalItems]

    JobBundleDetailResponse:
      type: object
      properties:
        job:
          $ref: '#/components/schemas/JobBundleSummaryView'
        recentRuns:
          type: array
          items:
            $ref: '#/components/schemas/RunSummaryView'
        recentTriggerEvents:
          type: array
          items:
            $ref: '#/components/schemas/TriggerEventView'
      required: [job, recentRuns, recentTriggerEvents]

    RunSummaryView:
      type: object
      properties:
        scenario:
          type: string
        jobExecutionId:
          oneOf:
            - type: integer
              format: int64
            - type: 'null'
        status:
          type: string
        startTime:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
        endTime:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
        durationSeconds:
          oneOf:
            - type: integer
              format: int64
            - type: 'null'
        sourceCount:
          oneOf:
            - type: integer
              format: int64
            - type: 'null'
        writtenCount:
          oneOf:
            - type: integer
              format: int64
            - type: 'null'
        rejectedCount:
          oneOf:
            - type: integer
              format: int64
            - type: 'null'
        logPath:
          type: string
      required: [scenario, jobExecutionId, status, startTime, endTime, durationSeconds, sourceCount, writtenCount, rejectedCount, logPath]

    RunSummaryListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RunSummaryView'
        page:
          type: integer
        size:
          type: integer
        totalItems:
          type: integer
          format: int64
      required: [items, page, size, totalItems]

    StepRecordView:
      type: object
      properties:
        stepName:
          type: string
        sequence:
          type: integer
        status:
          type: string
        stepExecutionId:
          oneOf:
            - type: integer
              format: int64
            - type: 'null'
        readCount:
          oneOf:
            - type: integer
              format: int64
            - type: 'null'
        writeCount:
          oneOf:
            - type: integer
              format: int64
            - type: 'null'
        filterCount:
          oneOf:
            - type: integer
              format: int64
            - type: 'null'
        skipCount:
          oneOf:
            - type: integer
              format: int64
            - type: 'null'
        rollbackCount:
          oneOf:
            - type: integer
              format: int64
            - type: 'null'
        rejectedCount:
          oneOf:
            - type: integer
              format: int64
            - type: 'null'
        startedAt:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
        finishedAt:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
        subFlow:
          type: string
        stepSummary:
          type: string
      required: [stepName, sequence, status, stepExecutionId, readCount, writeCount, filterCount, skipCount, rollbackCount, rejectedCount, startedAt, finishedAt, subFlow, stepSummary]

    ArtifactRecordView:
      type: object
      properties:
        artifactId:
          type: string
        role:
          type: string
        label:
          type: string
        pathOrUri:
          type: string
        createdAt:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
        recordCount:
          oneOf:
            - type: integer
              format: int64
            - type: 'null'
        stepName:
          type: string
      required: [artifactId, role, label, pathOrUri, createdAt, recordCount, stepName]

    FailureSummaryView:
      type: object
      properties:
        category:
          type: string
        exceptionType:
          type: string
        rootCause:
          type: string
        message:
          type: string
      required: [category, exceptionType, rootCause, message]

    EvidenceLinkView:
      type: object
      properties:
        label:
          type: string
        href:
          type: string
        type:
          type: string
      required: [label, href, type]

    RunDetailView:
      type: object
      properties:
        run:
          $ref: '#/components/schemas/RunSummaryView'
        steps:
          type: array
          items:
            $ref: '#/components/schemas/StepRecordView'
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/ArtifactRecordView'
        failureSummary:
          oneOf:
            - $ref: '#/components/schemas/FailureSummaryView'
            - type: 'null'
        evidenceLinks:
          type: array
          items:
            $ref: '#/components/schemas/EvidenceLinkView'
      required: [run, steps, artifacts, failureSummary, evidenceLinks]

    TriggerNowRequest:
      type: object
      properties:
        reason:
          type: string
        requestedBy:
          type: string

    TriggerNowDecisionStatus:
      type: string
      enum: [ACCEPTED, NOT_FOUND]

    TriggerNowDecisionResponse:
      type: object
      properties:
        jobKey:
          type: string
        decisionStatus:
          $ref: '#/components/schemas/TriggerNowDecisionStatus'
        message:
          type: string
        triggerEventId:
          oneOf:
            - type: string
            - type: 'null'
      required: [jobKey, decisionStatus, message, triggerEventId]

    TriggerEventView:
      type: object
      properties:
        triggerEventId:
          type: string
        jobKey:
          type: string
        decisionStatus:
          type: string
        reason:
          type: string
        requestedBy:
          type: string
        requestedAt:
          type: string
          format: date-time
        launchedRunId:
          oneOf:
            - type: string
            - type: 'null'
        message:
          type: string
      required: [triggerEventId, jobKey, decisionStatus, reason, requestedBy, requestedAt, launchedRunId, message]

    TriggerEventListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TriggerEventView'
        page:
          type: integer
        size:
          type: integer
        totalItems:
          type: integer
          format: int64
      required: [items, page, size, totalItems]

    ScheduleViewResponse:
      type: object
      properties:
        scheduleId:
          type: string
        scheduleKey:
          type: string
        selectedJobKey:
          type: string
        expression:
          type: string
        timezone:
          type: string
        enabled:
          type: boolean
        paused:
          type: boolean
        description:
          type: string
        updatedAt:
          type: string
          format: date-time
      required: [scheduleId, scheduleKey, selectedJobKey, expression, timezone, enabled, paused, description, updatedAt]

    ScheduleListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleViewResponse'
        page:
          type: integer
        size:
          type: integer
        totalItems:
          type: integer
          format: int64
      required: [items, page, size, totalItems]

    CreateScheduleRequest:
      type: object
      properties:
        scheduleKey:
          type: string
        selectedJobKey:
          type: string
        expression:
          type: string
        timezone:
          type: string
        enabled:
          oneOf:
            - type: boolean
            - type: 'null'
        description:
          type: string
      required: [scheduleKey, selectedJobKey, expression, timezone]

    UpdateScheduleRequest:
      type: object
      properties:
        selectedJobKey:
          type: string
        expression:
          type: string
        timezone:
          type: string
        enabled:
          oneOf:
            - type: boolean
            - type: 'null'
        description:
          type: string
      required: [selectedJobKey, expression, timezone]

    ScheduleStateChangeResponse:
      type: object
      properties:
        scheduleId:
          type: string
        enabled:
          type: boolean
        paused:
          type: boolean
        updatedAt:
          type: string
          format: date-time
      required: [scheduleId, enabled, paused, updatedAt]

    SystemHealthResponse:
      type: object
      properties:
        status:
          type: string
        timestamp:
          type: string
          format: date-time
      required: [status, timestamp]

    SystemInfoResponse:
      type: object
      properties:
        service:
          type: string
        javaVersion:
          type: string
        profile:
          type: string
      required: [service, javaVersion, profile]
