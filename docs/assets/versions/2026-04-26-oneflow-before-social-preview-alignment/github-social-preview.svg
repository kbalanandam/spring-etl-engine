      <stop stop-color="#22C55E"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1280" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="32" fill="url(#bg)"/>

  <circle cx="1100" cy="110" r="220" fill="#1D4ED8" fill-opacity="0.12"/>
  <circle cx="170" cy="560" r="230" fill="#22C55E" fill-opacity="0.10"/>
  <circle cx="1000" cy="530" r="150" fill="#38BDF8" fill-opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="86" y="76" width="1108" height="488" rx="28" fill="#0B1220" fill-opacity="0.72" stroke="#334155"/>
  </g>

  <rect x="120" y="112" width="170" height="40" rx="20" fill="#111827" stroke="#22C55E"/>
  <text x="205" y="138" text-anchor="middle" fill="#DCFCE7" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="700">spring-etl-engine</text>

  <g>
