  </g>

  <text x="430" y="300" fill="white" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="78" font-weight="800">OneFlow</text>

  <text x="430" y="382" fill="#CBD5E1" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="28" font-weight="500">
