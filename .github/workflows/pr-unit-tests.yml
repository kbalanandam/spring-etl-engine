name: PR Unit Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - master

concurrency:
  group: pr-unit-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-tests:
    name: Run Maven test suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run unit and integration tests
        run: mvn --batch-mode --no-transfer-progress test

      - name: Compute dependency-check cache key
        id: odc-cache-key
        run: |
          set -euo pipefail
          echo "week=$(date -u +%G-%V)" >> "$GITHUB_OUTPUT"
          echo "schema=v2" >> "$GITHUB_OUTPUT"

      - name: Restore dependency-check data cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/dependency-check
          key: odc-data-${{ runner.os }}-12.1.1-${{ steps.odc-cache-key.outputs.schema }}-${{ steps.odc-cache-key.outputs.week }}

      - name: Run dependency vulnerability scan (OWASP)
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.cache/dependency-check
          mkdir -p target
          EXTRA_ARGS=""
          FAIL_ON_ERROR="false"
          if [ -n "${NVD_API_KEY:-}" ]; then
            EXTRA_ARGS="-DnvdApiKey=${NVD_API_KEY}"
            FAIL_ON_ERROR="true"
          fi

          DC_COMMON_ARGS="\
            -DdataDirectory=$HOME/.cache/dependency-check \
            -DossindexAnalyzerEnabled=false \
            -Danalyzer.ossindex.enabled=false \
            -DfailOnError=${FAIL_ON_ERROR} \
            ${EXTRA_ARGS}"

          run_update() {
            mvn --batch-mode --no-transfer-progress \
              org.owasp:dependency-check-maven:12.1.1:update-only \
              ${DC_COMMON_ARGS}
          }

          run_scan() {
            mvn --batch-mode --no-transfer-progress \
              org.owasp:dependency-check-maven:12.1.1:check \
              -Dformats=HTML,JSON \
              -DoutputDirectory=target/dependency-check-report \
              -DautoUpdate=false \
              -DfailBuildOnCVSS=7 \
              ${DC_COMMON_ARGS}
          }

          purge_cache() {
            rm -rf "$HOME/.cache/dependency-check"
            mkdir -p "$HOME/.cache/dependency-check"
          }

          set +e
          run_update 2>&1 | tee target/dependency-check-update.log
          UPDATE_EXIT=${PIPESTATUS[0]}
          set -e

          if [ "${UPDATE_EXIT}" -ne 0 ]; then
            if grep -Eq 'Unable to obtain an exclusive lock|WriteLockException|NoDataException|No documents exist' target/dependency-check-update.log; then
              echo "Dependency-Check update lock/no-data issue detected; purging cache and retrying update once."
              purge_cache
              run_update
            else
              exit "${UPDATE_EXIT}"
            fi
          fi

          set +e
          run_scan 2>&1 | tee target/dependency-check-run.log
          SCAN_EXIT=${PIPESTATUS[0]}
          set -e

          if [ "${SCAN_EXIT}" -ne 0 ]; then
            if grep -Eq 'Value too long for column "URL CHARACTER VARYING\(1000\)"|Unable to obtain an exclusive lock|WriteLockException|NoDataException|No documents exist' target/dependency-check-run.log; then
              echo "Dependency-Check cache/update issue detected during scan; purging cache and retrying update+scan once."
              purge_cache
              run_update
              run_scan
            else
              exit "${SCAN_EXIT}"
            fi
          fi

      - name: Save dependency-check data cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/dependency-check
          key: odc-data-${{ runner.os }}-12.1.1-${{ steps.odc-cache-key.outputs.schema }}-${{ steps.odc-cache-key.outputs.week }}

      - name: Upload dependency scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report/**
          if-no-files-found: warn

      - name: Run secret scan (Gitleaks)
        run: |
          set -euo pipefail
          curl -sSfL -o /tmp/gitleaks_8.24.2_linux_x64.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz
          curl -sSfL -o /tmp/gitleaks_checksums.txt https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_checksums.txt
          grep " gitleaks_8.24.2_linux_x64.tar.gz$" /tmp/gitleaks_checksums.txt > /tmp/gitleaks_checksum.txt
          (cd /tmp && sha256sum -c /tmp/gitleaks_checksum.txt)
          tar -xzf /tmp/gitleaks_8.24.2_linux_x64.tar.gz -C /tmp
          install /tmp/gitleaks /usr/local/bin/gitleaks
          mkdir -p target
          gitleaks detect --config .gitleaks.toml --log-opts="--all" --redact --report-format json --report-path target/gitleaks-report.json

      - name: Upload secret scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: target/gitleaks-report.json
          if-no-files-found: warn

      - name: Security checklist reminder
        run: |
          echo "Security reminder:"
          echo "- Run/maintain security-focused negative tests for config and file boundaries"
          echo "- Ensure no credentials/tokens are committed"
          echo "- Review dependency vulnerabilities before merge"

